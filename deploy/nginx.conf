# ============================================================================
# Nginx Configuration for Data-Collection Platform on AWS Free Tier
# Optimized for t2.micro (1 vCPU, 1GB RAM) serving 50 concurrent users
#
# Reverse proxy: port 80/443 → Node.js on port 5000
# Frontend: served from S3 static website (or CloudFront)
# ============================================================================

# ---- Global tuning for t2.micro ----
worker_processes 1;                    # 1 vCPU = 1 worker

events {
    worker_connections 128;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # ---- Rate limiting (per IP) ----
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Replace with your domain name (or leave _ for IP-based access)
        server_name api.docsitesolutions.online;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- Gzip Compression (saves bandwidth) ---
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml
            application/rss+xml
            image/svg+xml;

        # --- Max upload size (110MB — must match server.js multer 100MB limit) ---
        # FIXED: was 50M which rejected files >50MB with 413 before reaching Node.js
        client_max_body_size 110M;

        # --- Timeouts for large uploads ---
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        # --- API requests → Node.js backend ---
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Buffer settings for large JSON payloads
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # --- Health check shortcut ---
        location /health {
            proxy_pass http://127.0.0.1:5000/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # --- Default: return info page ---
        # When using S3 for frontend, this serves as a fallback
        # Your frontend will be accessed via S3 URL / CloudFront directly
        location / {
            return 200 '{"service":"Data Collection API","status":"running","docs":"/api/health"}';
            add_header Content-Type application/json;
        }
    }

    # ================================================================
    # HTTPS server block (uncomment after running certbot)
    # sudo certbot --nginx -d yourdomain.com
    # ================================================================
